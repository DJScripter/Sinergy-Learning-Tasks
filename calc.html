<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивный калькулятор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 320px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .inputs-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            color: #555;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .result-box {
            margin-bottom: 1.5rem;
            min-height: 2.5rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #222;
            padding: 0.5rem 0;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        button {
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            background-color: #667eea;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Калькулятор</h2>

    <div class="inputs-group">
        <div>
            <label for="num1">Первое число</label>
            <input type="number" id="num1" placeholder="0">
        </div>
        <div>
            <label for="num2">Второе число</label>
            <input type="number" id="num2" placeholder="0">
        </div>
    </div>

    <div class="result-box" id="result">Результат</div>

    <div class="buttons-grid">
        <button onclick="calculate('sum')">Сумма</button>
        <button onclick="calculate('diff')">Разность</button>
        <button onclick="calculate('prod')">Произведение</button>
        <button onclick="calculate('div')">Деление</button>
    </div>
</div>

<script>
    function getNumbers() {
        const num1 = document.getElementById('num1').value;
        const num2 = document.getElementById('num2').value;

        // Если поля пустые — считаем как 0
        const n1 = num1 === '' ? 0 : Number(num1);
        const n2 = num2 === '' ? 0 : Number(num2);

        return { n1, n2, num1, num2 };
    }

    function showError(message) {
        document.getElementById('result').textContent = 'Ошибка: ' + message;
        document.getElementById('result').style.color = '#d9534f';
    }

    function showResult(value) {
        document.getElementById('result').textContent = value;
        document.getElementById('result').style.color = '#222';
    }

    // 4 отдельные функции под каждую операцию
    function sum(a, b) { return a + b; }
    function diff(a, b) { return a - b; }
    function prod(a, b) { return a * b; }
    function div(a, b) {
        if (b === 0) {
            throw new Error('деление на ноль');
        }
        return a / b;
    }

    function calculate(operation) {
        const { n1, n2, num1, num2 } = getNumbers();

        // Проверка: если в инпутах не числа (NaN) — ошибка
        if (num1 !== '' && isNaN(n1)) {
            showError('в первом поле не число');
            return;
        }
        if (num2 !== '' && isNaN(n2)) {
            showError('во втором поле не число');
            return;
        }

        let resultValue;

        try {
            switch (operation) {
                case 'sum':
                    resultValue = sum(n1, n2);
                    break;
                case 'diff':
                    resultValue = diff(n1, n2);
                    break;
                case 'prod':
                    resultValue = prod(n1, n2);
                    break;
                case 'div':
                    resultValue = div(n1, n2);
                    break;
                default:
                    showError('неизвестная операция');
                    return;
            }
            showResult(resultValue);
        } catch (e) {
            showError(e.message);
        }
    }
</script>

</body>
</html>
