<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Счётчик — тест</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: #333;
    }
    .counter-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.9);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    #result {
      font-size: 3rem;
      font-weight: bold;
      min-width: 80px;
      padding: 10px 20px;
      margin: 1.5rem 0;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }
    .buttons-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      color: white;
      background: linear-gradient(145deg, #3a7bd5, #2c5f99);
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.98); }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: linear-gradient(145deg, #ccc, #aaa);
    }
    #extreme-message {
      margin-top: 1.5rem;
      font-size: 1.2rem;
      font-weight: bold;
      display: none;
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <div class="counter-container">
    <h2>Счётчик</h2>
    <div id="result">0</div>
    <div class="buttons-group">
      <button id="btn-minus">-</button>
      <button id="btn-plus">+</button>
    </div>
    <div id="extreme-message">Вы достигли экстремального значения</div>
  </div>

  <script>
    const resultEl = document.getElementById('result');
    const btnPlus = document.getElementById('btn-plus');
    const btnMinus = document.getElementById('btn-minus');
    const messageEl = document.getElementById('extreme-message');

    let count = 0;

    function updateUI() {
      resultEl.textContent = count;

      if (count > 0) {
        resultEl.style.backgroundColor = '#fff3cd';
      } else if (count < 0) {
        resultEl.style.backgroundColor = '#e8f5e9';
      } else {
        resultEl.style.backgroundColor = '#ffebee';
      }

      btnPlus.disabled = count >= 10;
      btnMinus.disabled = count <= -10;

      if (count === 10 || count === -10) {
        messageEl.style.display = 'block';
      } else {
        messageEl.style.display = 'none';
      }
    }

    btnPlus.addEventListener('click', () => {
      if (!btnPlus.disabled) {
        count++;
        updateUI();
      }
    });

    btnMinus.addEventListener('click', () => {
      if (!btnMinus.disabled) {
        count--;
        updateUI();
      }
    });

    updateUI();
  </script>
</body>
</html>
